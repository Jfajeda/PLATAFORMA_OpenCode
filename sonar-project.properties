# =============================================================
# sonar-project.properties
# Configuracion de SonarQube Scanner para este proyecto
# CODANOR - Jafa, S.L. | Barcelona, Catalunya
# =============================================================

# --- Identificacion (obligatorio) ---
sonar.projectKey=Jfajeda_PLATAFORMA_OpenCode
sonar.organization=Jfajeda

# --- Informacion del proyecto ---
sonar.projectName=Plataforma OpenCode
sonar.projectVersion=3.0.0

# --- Fuentes ---
sonar.sources=.
sonar.sourceEncoding=UTF-8

# --- Exclusiones ---
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.git/**,\
  **/vendor/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.min.css

# --- Quality Gate ---
sonar.qualitygate.wait=true
